<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#667eea" opacity="0.1"/>
  
  <!-- Horn -->
  <polygon points="100,30 95,70 105,70" fill="#FFD700"/>
  <polygon points="100,35 96,68 104,68" fill="#FFA500"/>
  
  <!-- Horn shine -->
  <line x1="100" y1="35" x2="100" y2="65" stroke="#fff" stroke-width="2" opacity="0.6"/>
  
  <!-- Head -->
  <circle cx="100" cy="100" r="45" fill="#FFB6D9"/>
  
  <!-- Ears -->
  <ellipse cx="75" cy="65" rx="12" ry="25" fill="#FFB6D9" transform="rotate(-30 75 65)"/>
  <ellipse cx="125" cy="65" rx="12" ry="25" fill="#FFB6D9" transform="rotate(30 125 65)"/>
  
  <!-- Inner ears -->
  <ellipse cx="75" cy="68" rx="7" ry="18" fill="#FFC0CB" transform="rotate(-30 75 68)"/>
  <ellipse cx="125" cy="68" rx="7" ry="18" fill="#FFC0CB" transform="rotate(30 125 68)"/>
  
  <!-- Mane -->
  <path d="M 75 60 Q 70 50 80 40 Q 85 50 80 60" fill="#FF69B4"/>
  <path d="M 85 55 Q 78 42 90 35 Q 95 48 90 58" fill="#FF1493"/>
  <path d="M 95 52 Q 90 38 102 32 Q 105 48 100 58" fill="#FF69B4"/>
  <path d="M 125 55 Q 132 42 120 35 Q 115 48 120 58" fill="#FF69B4"/>
  <path d="M 115 52 Q 120 38 108 32 Q 105 48 110 58" fill="#FF1493"/>
  
  <!-- Eyes -->
  <circle cx="85" cy="90" r="6" fill="#000"/>
  <circle cx="115" cy="90" r="6" fill="#000"/>
  
  <!-- Eye shine -->
  <circle cx="86" cy="88" r="2" fill="#fff"/>
  <circle cx="116" cy="88" r="2" fill="#fff"/>
  
  <!-- Nose -->
  <ellipse cx="100" cy="108" rx="5" ry="4" fill="#FF69B4"/>
  
  <!-- Mouth -->
  <path d="M 100 108 Q 95 115 88 113" stroke="#FF1493" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 100 108 Q 105 115 112 113" stroke="#FF1493" stroke-width="2" fill="none" stroke-linecap="round"/>
  
  <!-- Cheeks -->
  <circle cx="70" cy="100" r="8" fill="#FF69B4" opacity="0.5"/>
  <circle cx="130" cy="100" r="8" fill="#FF69B4" opacity="0.5"/>
  
  <!-- Stars decoration -->
  <g fill="#667eea">
    <polygon points="150,60 153,68 161,68 155,73 158,81 150,76 142,81 145,73 139,68 147,68"/>
    <polygon points="60,140 62,145 68,145 63,149 65,154 60,150 55,154 57,149 52,145 58,145"/>
    <polygon points="140,150 141,153 145,153 142,155 143,159 140,156 137,159 138,155 135,153 139,153"/>
  </g>
  
  <!-- Rainbow colors accent -->
  <defs>
    <linearGradient id="rainbow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF1493;stop-opacity:1" />
      <stop offset="25%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#00CED1;stop-opacity:1" />
      <stop offset="75%" style="stop-color:#9370DB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF69B4;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Circle outline -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="url(#rainbow)" stroke-width="3"/>
</svg>
